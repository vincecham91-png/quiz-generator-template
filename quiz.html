<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 互动测验生成器</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="quiz.css" />
</head>
<body>
    <div class="container">
        <header class="top-panel">
            <div class="logo"><h1>AI 互动测验生成器</h1></div>
        </header>
        <main class="content-area">
            <section class="quiz-section">
                <div class="quiz-card glass">
                    <h2>创建测验</h2>
                    <form id="quiz-form">
                        <div class="form-group">
                            <label for="file-input">上传文件 (PPT, DOC, PDF):</label>
                            <input type="file" id="file-input" accept=".ppt,.pptx,.doc,.docx,.pdf" required />
                        </div>
                        <div class="form-group">
                            <label for="difficulty-select">难度等级:</label>
                            <select id="difficulty-select" required>
                                <option value="easy">简单</option>
                                <option value="medium">中等</option>
                                <option value="hard">困难</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="question-count">题目数量:</label>
                            <input type="number" id="question-count" min="1" max="50" value="5" required />
                        </div>
                        <div class="form-group">
                            <label for="time-limit">每题时间 (秒):</label>
                            <input type="number" id="time-limit" min="5" max="300" value="30" required />
                        </div>
                        <button type="submit" class="generate-btn">生成测验</button>
                    </form>
                    <div id="quiz-output" class="quiz-output hidden"></div>
                </div>
            </section>
        </main>
    </div>
    <script src="quiz.js"></script>
</body>
</html>
